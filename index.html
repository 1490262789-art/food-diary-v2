<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="color-scheme" content="only light">
<meta name="supported-color-schemes" content="light">
<meta name="theme-color" content="#ffffff">
<title>饮食日记</title>
<style>
:root{color-scheme:only light!important}
html,body{background:#fff!important;color:#333!important;margin:0;padding:0;font:16px -apple-system,'PingFang SC','Microsoft YaHei',sans-serif;-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
*{box-sizing:border-box}
body{padding:20px 16px 80px;max-width:600px;margin:0 auto}
h1{font-size:20px;font-weight:600;margin:0 0 24px;color:#222!important}
.fm{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.fm label{font-size:14px;color:#666!important;min-width:40px;flex-shrink:0}
.fm input,.fm select,.fm textarea{flex:1;border:none;border-bottom:1px solid #ccc;padding:10px 0;font-size:16px;outline:none;background:#fff!important;color:#333!important;-webkit-appearance:none;appearance:none;border-radius:0}
.fm input::placeholder{color:#aaa!important}
.fm input:focus,.fm select:focus{border-bottom-color:#333}
.g2{display:grid;grid-template-columns:1fr 1fr;column-gap:16px}
.btn{display:inline-block;border:1px solid #333;background:#fff!important;color:#333!important;padding:10px 20px;font-size:15px;cursor:pointer;-webkit-appearance:none;appearance:none;border-radius:0}
.btn:active{background:#eee!important}
.btn-save{display:block;width:100%;background:#333!important;color:#fff!important;border:none;padding:14px;font-size:16px;margin-top:10px;font-weight:500}
.btn-save:active{background:#555!important}
.upload{display:block;border:1px dashed #aaa;padding:14px;text-align:center;color:#888!important;font-size:14px;margin:4px 0;cursor:pointer;background:#fafafa!important}
.upload:active{background:#eee!important}
.thumbs{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.thumbs img{width:50px;height:50px;object-fit:cover;border:1px solid #eee}
.thumbs .w{position:relative;display:inline-block}
.thumbs .x{position:absolute;top:-8px;right:-8px;background:#333!important;color:#fff!important;border:none;width:20px;height:20px;font-size:12px;border-radius:50%;line-height:20px;text-align:center;cursor:pointer}
.section{margin-top:34px}
.bar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.bar input[type=date]{border:1px solid #ccc;padding:8px 10px;font-size:14px;background:#fff!important;color:#333!important;outline:none}
.bar a{font-size:14px;color:#666!important;text-decoration:underline;cursor:pointer}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 6px;border-bottom:2px solid #ddd;color:#888!important;font-weight:400;white-space:nowrap;background:#fff!important}
td{vertical-align:top;padding:8px 6px;border-bottom:1px solid #eee;background:#fff!important;color:#333!important}
.ti{width:32px;height:32px;object-fit:cover;cursor:pointer}
.bdg{display:inline-block;border:1px solid #ccc;padding:2px 6px;font-size:12px;color:#666!important;background:#fff!important}
.empty{text-align:center;padding:40px;color:#aaa!important;font-size:14px}
.mdl{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);z-index:999;display:flex;align-items:center;justify-content:center;cursor:pointer}
.mdl img{max-width:95%;max-height:90%}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333!important;color:#fff!important;padding:10px 24px;font-size:14px;z-index:998;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.on{opacity:1}
.spin{display:inline-block;width:14px;height:14px;border:2px solid #ddd;border-top-color:#333;border-radius:50%;animation:s .6s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes s{to{transform:rotate(360deg)}}
@media(max-width:420px){.g2{grid-template-columns:1fr}}
</style>
</head>
<body>

<h1>饮食日记</h1>

<!-- 表单 - JS失败也会显示 -->
<div class="fm"><label>名字</label><input id="uname" placeholder="你的名字" maxlength="10" autocomplete="off"></div>
<div class="fm"><label>日期</label><input type="date" id="udate"></div>
<div class="g2">
  <div class="fm"><label>早餐</label><input id="brk" placeholder="吃了什么" autocomplete="off"></div>
  <div class="fm"><label>午餐</label><input id="lun" placeholder="吃了什么" autocomplete="off"></div>
  <div class="fm"><label>晚餐</label><input id="din" placeholder="吃了什么" autocomplete="off"></div>
  <div class="fm"><label>加餐</label><input id="snk" placeholder="零食/饮品" autocomplete="off"></div>
</div>
<div class="g2">
  <div class="fm"><label>饮水</label><input id="wtr" placeholder="1500ml" autocomplete="off"></div>
  <div class="fm"><label>标签</label><select id="utag"><option value="">-</option><option>家常菜</option><option>外卖</option><option>甜品</option><option>重油重辣</option><option>清淡减脂</option><option>其他</option></select></div>
</div>
<div class="fm"><label>备注</label><input id="rmk" placeholder="想说的话" autocomplete="off"></div>
<div class="upload" id="upl">＋ 拍照 / 选择照片</div>
<input type="file" id="pics" accept="image/*" capture="environment" multiple style="display:none">
<div class="thumbs" id="pv"></div>
<button class="btn-save" id="sb">保存</button>

<!-- 记录区 -->
<div class="section">
  <div class="bar">
    <input type="date" id="filt">
    <a id="clr">清除筛选</a>
    <a id="exp">导出CSV</a>
    <span style="margin-left:auto;font-size:13px;color:#aaa!important" id="rc"></span>
  </div>
  <div id="ld" style="text-align:center;padding:30px;color:#aaa!important"><span class="spin"></span>加载中</div>
  <noscript><p style="text-align:center;color:#c44">请启用 JavaScript 以查看记录</p></noscript>
  <div style="overflow-x:auto" id="tw" hidden>
    <table><thead><tr><th>日期</th><th>名字</th><th>照片</th><th>早餐</th><th>午餐</th><th>晚餐</th><th>加餐</th><th>饮水</th><th>标签</th><th>备注</th><th></th></tr></thead><tbody id="tb"></tbody></table>
  </div>
  <div class="empty" id="em" hidden>暂无记录</div>
</div>

<div class="toast" id="ts"></div>
<div class="mdl" id="md" hidden onclick="this.hidden=true"><img id="mi"></div>

<script>
// ===== 配置 =====
var K='$2a$10$LaFzu8ik4tTzNy35YLBF1OcoTogoIbWJUQ4/SpkQ.0M3UUhjGeyRO';
var B='6a453823f5f4af5e294e5db2';
var A='https://api.jsonbin.io/v3/b/'+B;
var H={'X-Master-Key':K,'Content-Type':'application/json'};

// ===== 状态 =====
var R=[],F='',P=[],I=function(id){return document.getElementById(id)};

// ===== 初始化 =====
I('udate').valueAsDate=new Date();
var sn=localStorage.getItem('fd_name')||'';
I('uname').value=sn;
I('uname').oninput=function(){localStorage.setItem('fd_name',I('uname').value.trim())};

// ===== 事件绑定 =====
I('upl').onclick=function(){I('pics').click()};
I('pics').onchange=hpic;
I('sb').onclick=save;
I('filt').onchange=applyFilter;
I('clr').onclick=function(){I('filt').value='';F='';render()};
I('exp').onclick=expCSV;

load();

// ===== Toast =====
var tt;
function toast(m){
  var t=I('ts');t.textContent=m;t.classList.add('on');
  clearTimeout(tt);tt=setTimeout(function(){t.classList.remove('on')},2000);
}

// ===== 图片处理 =====
function hpic(e){
  var fs=Array.from(e.target.files);if(!fs.length)return;
  if(P.length+fs.length>5){toast('最多5张');e.target.value='';return}
  var done=0;toast('压缩中');
  fs.forEach(function(f){
    var r=new FileReader();
    r.onload=function(ev){
      var im=new Image();
      im.onload=function(){
        var c=document.createElement('canvas'),mx=400,w=im.width,h=im.height;
        if(w>mx||h>mx){if(w>h){h=h*mx/w;w=mx}else{w=w*mx/h;h=mx}}
        c.width=w;c.height=h;
        c.getContext('2d').drawImage(im,0,0,w,h);
        P.push(c.toDataURL('image/jpeg',0.6));
        done++;if(done===fs.length){showP();toast('已压缩')}
      };
      im.src=ev.target.result;
    };
    r.readAsDataURL(f);
  });
  e.target.value='';
}

function showP(){
  I('pv').innerHTML=P.map(function(p,i){
    return'<span class="w"><img src="'+p+'" onclick="event.stopPropagation();big(\''+p+'\')"><button class="x" onclick="event.stopPropagation();delp('+i+')">&times;</button></span>'
  }).join('');
}

function delp(i){P.splice(i,1);showP()}
function big(s){I('mi').src=s;I('md').hidden=false}

// ===== 数据操作 =====
function load(){
  I('ld').hidden=false;I('tw').hidden=true;I('em').hidden=true;
  fetch(A+'/latest',{headers:H}).then(function(r){
    if(!r.ok)throw new Error();return r.json();
  }).then(function(j){
    var d=j.record;
    if(Array.isArray(d))R=d;
    else if(d&&d.records)R=d.records;
    else R=[];
    render();
  }).catch(function(){
    R=[];render();
  });
}

function save(){
  var n=I('uname').value.trim();if(!n){toast('请输入名字');return}
  var o={
    id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),
    date:I('udate').value,
    name:n,
    breakfast:I('brk').value.trim(),
    lunch:I('lun').value.trim(),
    dinner:I('din').value.trim(),
    snacks:I('snk').value.trim(),
    water:I('wtr').value.trim(),
    tag:I('utag').value,
    mood:I('rmk').value.trim(),
    photos:P.slice(),
    time:new Date().toISOString()
  };
  if(!o.date){toast('请选择日期');return}
  if(!o.breakfast&&!o.lunch&&!o.dinner&&!o.snacks&&!o.photos.length){toast('至少填一项');return}
  I('sb').disabled=true;I('sb').textContent='保存中';

  // 拉最新数据 → 追加 → 写入
  fetch(A+'/latest',{headers:H}).then(function(r){
    if(!r.ok)throw new Error();
    return r.json();
  }).then(function(j){
    var d=j.record;
    if(Array.isArray(d))d={records:d};
    if(!d||!d.records)d={records:[]};
    d.records.push(o);
    return fetch(A,{method:'PUT',headers:H,body:JSON.stringify(d)});
  }).then(function(r){
    if(!r.ok)throw new Error();
    // 本地追加，不等服务器
    R.push(o);
    // 清空表单
    ['brk','lun','din','snk','wtr','rmk'].forEach(function(id){I(id).value=''});
    I('utag').value='';P=[];I('pv').innerHTML='';
    render();toast('已保存');
  }).catch(function(){
    // 降级：直接本地追加+写入
    fetch(A,{method:'PUT',headers:H,body:JSON.stringify({records:R.concat([o])})}).then(function(r){
      if(r.ok){R.push(o);['brk','lun','din','snk','wtr','rmk'].forEach(function(id){I(id).value=''});
      I('utag').value='';P=[];I('pv').innerHTML='';render();toast('已保存')}
      else{toast('保存失败')}
    }).catch(function(){toast('网络错误')});
  }).finally(function(){
    I('sb').disabled=false;I('sb').textContent='保存';
  });
}

function render(){
  I('ld').hidden=true;
  var rs=R.slice();
  if(F)rs=rs.filter(function(r){return r.date===F});
  rs.sort(function(a,b){
    if(b.date!==a.date)return b.date.localeCompare(a.date);
    return(b.time||'').localeCompare(a.time||'');
  });
  I('rc').textContent=rs.length+' 条';
  if(!rs.length){I('tw').hidden=true;I('em').hidden=false;return}
  I('em').hidden=true;I('tw').hidden=false;
  var cn=I('uname').value.trim();
  I('tb').innerHTML=rs.map(function(r){
    var me=r.name===cn;
    var ph=r.photos&&r.photos.length?r.photos.map(function(p){return'<img class="ti" src="'+es(p)+'" onclick="event.stopPropagation();big(\''+es(p)+'\')">'}).join(''):'-';
    var tg=r.tag?'<span class="bdg">'+es(r.tag)+'</span>':'';
    var tm=r.time?new Date(r.time).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}):'';
    return'<tr><td nowrap>'+r.date+'<br><span style="color:#aaa;font-size:11px">'+tm+'</span></td><td nowrap>'+es(r.name)+'</td><td>'+ph+'</td><td>'+es(r.breakfast||'-')+'</td><td>'+es(r.lunch||'-')+'</td><td>'+es(r.dinner||'-')+'</td><td>'+es(r.snacks||'-')+'</td><td nowrap>'+es(r.water||'-')+'</td><td nowrap>'+tg+'</td><td style="max-width:100px">'+es(r.mood||'-')+'</td><td>'+(me?'<button onclick="del(\''+r.id+'\')" style="background:none;border:none;cursor:pointer;color:#aaa;font-size:16px">&times;</button>':'')+'</td></tr>';
  }).join('');
}

function del(id){
  if(!confirm('删除这条记录？'))return;
  fetch(A+'/latest',{headers:H}).then(function(r){
    if(!r.ok)throw new Error();return r.json();
  }).then(function(j){
    var d=j.record;
    if(Array.isArray(d))d={records:d};
    d.records=(d.records||[]).filter(function(x){return x.id!==id});
    return fetch(A,{method:'PUT',headers:H,body:JSON.stringify(d)});
  }).then(function(r){
    if(!r.ok)throw new Error();
    R=R.filter(function(x){return x.id!==id});
    render();toast('已删除');
  }).catch(function(){toast('删除失败')});
}

function applyFilter(){F=I('filt').value;render()}

function expCSV(){
  var hd=['日期','名字','早餐','午餐','晚餐','加餐','饮水','标签','备注','照片','时间'];
  var rs=[hd];
  R.sort(function(a,b){return(b.time||'').localeCompare(a.time||'')});
  R.forEach(function(r){
    rs.push([r.date,r.name,r.breakfast||'',r.lunch||'',r.dinner||'',r.snacks||'',r.water||'',r.tag||'',r.mood||'',(r.photos?r.photos.length:0)+'张',r.time?new Date(r.time).toLocaleString('zh-CN'):'']);
  });
  var csv=rs.map(function(r){return r.map(function(c){return'"'+String(c).replace(/"/g,'""')+'"'}).join(',')}).join('\n');
  var b=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  var u=URL.createObjectURL(b);
  var a=document.createElement('a');a.href=u;a.download='饮食记录.csv';document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(u);
}

function es(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
</script>
</body>
</html>
